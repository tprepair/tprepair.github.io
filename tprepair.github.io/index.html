    <style>
        /* ========================================================
           1. THAI FONT DECLARATIONS (Targeting Thai characters)
           ======================================================== */
        @font-face {
            font-family: 'SmartShopFont';
            src: url('Fonts/IBMPlexSansThai-Regular.ttf') format('truetype');
            font-weight: 400; /* Regular weight */
            font-style: normal;
            /* Tells the browser to use this font ONLY for Thai letters/numbers */
            unicode-range: U+0E00-0E7F; 
        }

        @font-face {
            font-family: 'SmartShopFont';
            src: url('Fonts/IBMPlexSansThai-SemiBold.ttf') format('truetype');
            font-weight: 700; /* Bold weight */
            font-style: normal;
            unicode-range: U+0E00-0E7F;
        }

        /* ========================================================
           2. ENGLISH FONT DECLARATIONS (Fallbacks for Translation)
           ======================================================== */
        @font-face {
            font-family: 'SmartShopFont';
            src: url('Fonts/JetBrainsMono-Light.ttf') format('truetype');
            font-weight: 400; /* Regular weight */
            font-style: normal;
            /* Basic Latin/English characters, numbers, and common punctuation */
            unicode-range: U+0000-007F; 
        }

        @font-face {
            font-family: 'SmartShopFont';
            src: url('Fonts/JetBrainsMono-SemiBold.ttf') format('truetype');
            font-weight: 700; /* Bold weight */
            font-style: normal;
            unicode-range: U+0000-007F;
        }

        /* ========================================================
           3. LAYOUT & TYPOGRAPHY
           ======================================================== */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center; 
            align-items: center;     
            background-color: #f4f4f9; 
        }

        .redirect-text {
            /* Use the universal family name we assigned above */

            /* You can control the thickness using numbers now! */

        }
        body {
    /* Links to your background image file */

    /* Ensures the background starts smoothly in the top-left corner */
    background-position: top left;

    margin: 0;
